name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
      PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
      PUBLIC_CONTACT_GITHUB: ${{ vars.PUBLIC_CONTACT_GITHUB }}
      PUBLIC_CONTACT_LINKEDIN: ${{ vars.PUBLIC_CONTACT_LINKEDIN }}
      PUBLIC_SENSITIVE_QUERY_KEY: ${{ vars.PUBLIC_SENSITIVE_QUERY_KEY }}
      PUBLIC_SENSITIVE_QUERY_VALUE: ${{ vars.PUBLIC_SENSITIVE_QUERY_VALUE }}
      ASTRO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
