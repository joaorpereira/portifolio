name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
      PUBLIC_CONTACT_GITHUB: ${{ vars.PUBLIC_CONTACT_GITHUB }}
      PUBLIC_CONTACT_LINKEDIN: ${{ vars.PUBLIC_CONTACT_LINKEDIN }}
      # CI never reads .env.production — use repo Actions Variables or Secrets (not only Environment-scoped).
      PUBLIC_SENSITIVE_QUERY_KEY: ${{ vars.PUBLIC_SENSITIVE_QUERY_KEY || 'password' }}
      PUBLIC_SENSITIVE_QUERY_VALUE: ${{ vars.PUBLIC_SENSITIVE_QUERY_VALUE || secrets.PUBLIC_SENSITIVE_QUERY_VALUE }}
      ASTRO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check reveal gate is set for production
        run: |
          if [ -z "$PUBLIC_SENSITIVE_QUERY_VALUE" ]; then
            echo "::warning::PUBLIC_SENSITIVE_QUERY_VALUE is empty. Add it under Settings → Secrets and variables → Actions → Variables (repository) or Secrets named PUBLIC_SENSITIVE_QUERY_VALUE, then redeploy. The URL ?password=… will not unlock until the next build picks it up."
          fi

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
